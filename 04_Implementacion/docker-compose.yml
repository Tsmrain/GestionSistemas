services:
  db:
    image: postgres:15-alpine
    container_name: reservas-db
    environment:
      POSTGRES_DB: sistema_reservas
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      TZ: America/La_Paz
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sistema-integrado/backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sistema_reservas"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - reservas-network

  backend:
    build:
      context: ./sistema-integrado/backend
      dockerfile: Dockerfile
    container_name: reservas-backend
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/sistema_reservas
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=adminpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - TZ=America/La_Paz
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - reservas-network

  frontend:
    build:
      context: ./sistema-integrado/frontend
      dockerfile: Dockerfile
    container_name: reservas-frontend
    ports:
      - "80:80"
    volumes:
      - ./sistema-integrado/frontend:/usr/share/nginx/html
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - reservas-network

volumes:
  postgres_data:

networks:
  reservas-network:
    driver: bridge
