<!DOCTYPE html>

<html lang="es">

<head>
    <title>Reserva Residencial</title>
    <link rel="stylesheet" href="css/styless.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <h1>Reserva Residencial</h1>
    <h2>Consultar Disponibilidad</h2>

    <!-- FORMULARIO DE BUSQUEDA -->
    <div class="busqueda-container">
        <select id="tipo-select">
            <option value="Todo">Todos</option>
            <option value="Estandar">Estandar</option>
            <option value="Vip">Vip</option>
            <option value="Super Vip">Super Vip</option>
        </select>

        <input type="date" id="fecha-input">

        <button id="btn-buscar">Buscar</button>
    </div>

    <!--AQUI LA VISTA VA A DIBUJAR LAS TARJETAS-->
    <div id="resultado-container"></div>

    <!-- MODAL DE RESERVA (CU-02) -->
    <div id="reserva-modal" class="modal">
        <div class="modal-content">
            <span id="btn-cerrar-modal" class="close">&times;</span>
            <h2>Confirmar Reserva</h2>
            <div id="detalles-habitacion"></div>
            <form id="reserva-form">
                <div class="form-group">
                    <label>Nombre Completo:</label>
                    <input type="text" id="huesped-nombre" required>
                </div>
                <div class="form-group">
                    <label>Documento de Identidad:</label>
                    <input type="text" id="documento-identidad" required placeholder="Ingresa CI para autocompletar">
                </div>
                <div class="form-group">
                    <label>Información de Contacto:</label>
                    <input type="text" id="contacto" required placeholder="Teléfono o Email">
                </div>
                <button type="submit" class="btn-confirmar">Confirmar Registro</button>
            </form>
        </div>
    </div>

    <!--SE CARGAN EN ESTE ORDEN EXACTO-->
    <script src="models/Habitacion.js"></script>
    <script src="views/DisponibilidadView.js"></script>
    <script src="views/ReservaView.js"></script>
    <script src="controllers/DisponibilidadController.js"></script>
    <script src="controllers/ReservaController.js"></script>

</body>

</html>
