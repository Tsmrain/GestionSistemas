<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva Residencial - Autoservicio</title>
    <link rel="stylesheet" href="css/styless.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <h1>Reserva Residencial</h1>
    <h2>Consultar Disponibilidad</h2>

    <div class="busqueda-container">
        <select id="tipo-select">
            <option value="Todo">Todos</option>
            <option value="Sencilla">Sencilla</option>
            <option value="Doble">Doble</option>
            <option value="VIP">VIP</option>
        </select>
        <input type="date" id="fecha-input">
        <button id="btn-buscar">Buscar</button>
    </div>

    <div id="resultado-container"></div>

    <!-- MODAL DE RESERVA (CU-02) -->
    <div id="reserva-modal" class="modal">
        <div class="modal-content">
            <span id="btn-cerrar-modal" class="close">&times;</span>
            <h2>Confirmar Reserva</h2>
            <div id="detalles-habitacion"></div>
            <form id="reserva-form">
                <div class="form-group">
                    <label>Nombre Completo:</label>
                    <input type="text" id="huesped-nombre" required>
                </div>
                <div class="form-group">
                    <label>Número de Celular:</label>
                    <input type="text" id="huesped-celular" required>
                </div>
                <div class="form-group">
                    <label>Cantidad de Bloques (12h):</label>
                    <select id="cantidad-bloques" required>
                        <option value="1">1 Bloque (12 horas)</option>
                        <option value="2">2 Bloques (24 horas)</option>
                        <option value="3">3 Bloques (36 horas)</option>
                        <option value="4">4 Bloques (48 horas)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Carnet de Identidad (Anverso):</label>
                    <input type="file" id="foto-anverso" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label>Carnet de Identidad (Reverso):</label>
                    <input type="file" id="foto-reverso" accept="image/*" required>
                </div>
                <button type="submit" class="btn-confirmar">Continuar al Pago</button>
            </form>
        </div>
    </div>

    <!-- Scripts con rutas corregidas (Arquitectura en Capas) -->
    <script src="../domain/models/Habitacion.js"></script>
    <script src="views/DisponibilidadView.js"></script>
    <script src="views/ReservaView.js"></script>
    <script src="../application/controllers/DisponibilidadController.js"></script>
    <script src="../application/controllers/ReservaController.js"></script>
</body>
</html>
