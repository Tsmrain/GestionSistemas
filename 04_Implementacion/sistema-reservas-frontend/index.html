<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Residencial</title>
    <link rel="stylesheet" href="css/styless.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <h1>Reserva Residencial</h1>
    <h2>Consultar Disponibilidad</h2>

    <div class="busqueda-container">
        <select id="tipo-select">
            <option value="Todas las habitaciones">Todas las habitaciones</option>
            <option value="Estandar">Estandar</option>
            <option value="VIP">VIP</option>
            <option value="SUPERVIP">SUPERVIP</option>
        </select>
        <input type="date" id="fecha-input">
        <button id="btn-buscar">Buscar</button>
    </div>

    <div id="resultado-container"></div>

    <!-- Modelos -->
    <script src="models/Habitacion.js"></script>
    <script src="models/Pago.js"></script>

    <!-- Vistas -->
    <script src="views/DisponibilidadView.js"></script>
    <script src="views/ReservaView.js"></script>
    <script src="views/PagoView.js"></script>

    <!-- Controladores -->
    <script src="controllers/DisponibilidadController.js"></script>
    <script src="controllers/ReservaController.js"></script>
    <script src="controllers/PagoController.js"></script>

</body>

</html>
